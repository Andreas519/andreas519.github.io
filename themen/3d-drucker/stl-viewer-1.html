  <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D-Drucker · Young Engineers</title>
    <meta name="author" content="Andreas Sigismund">
    <meta name="publisher" content="Andreas Sigismund">
    <meta name="project" content="Prusa MK4, AG Young Engineers">
    <link rel="stylesheet" href="../../css/my.css">

    <style>
      .stl-viewer-wrap {
        margin-top: 1rem;
        border: 1px solid #d8dee9;
        border-radius: 10px;
        overflow: hidden;
        background: #111827;
      }

      .stl-viewer {
        position: relative;
        width: 100%;
        height: min(72vh, 760px);
        min-height: 420px;
        background: #111827;
      }

      .stl-toolbar {
        position: absolute;
        z-index: 10;
        top: 16px;
        left: 16px;
        right: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgb(255 255 255 / 90%);
        box-shadow: 0 4px 14px rgb(0 0 0 / 25%);
      }

      .stl-toolbar label {
        display: inline-flex;
        gap: 0.4rem;
        align-items: center;
      }

      .stl-status {
        color: #374151;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .stl-viewer canvas {
        display: block;
      }

      @media (max-width: 640px) {
        .stl-viewer {
          height: 62vh;
          min-height: 360px;
        }
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <header>
      <h3>3D-Drucker</h3>
    </header>
    <main>
      <section>
        <p>Lokaler STL-Viewer für den schnellen Blick auf 3D-Modelle aus der AG.</p>

        <div class="stl-viewer-wrap">
          <div id="viewer" class="stl-viewer">
            <div class="stl-toolbar" id="toolbar">
              <label>
                STL-Datei:
                <input id="fileInput" type="file" accept=".stl,model/stl">
              </label>

              <label>
                <input id="autoRotate" type="checkbox" checked>
                automatisch drehen
              </label>

              <span id="status" class="stl-status">Noch keine Datei geladen</span>
            </div>
          </div>
        </div>
      </section>

      <section>

      </section>
    </main>
    <footer>
      © Andreas Sigismund · AG Young Engineers · Martin-Rinckart-Gymnasium Eilenburg<br>
      Letzte Änderung: <span id="lastModified">TT.MM.JJJJ, hh:mm Uhr</span>
      <script src="../../js/script.js"></script>
    </footer>

    <script type="module">
    import * as THREE from "three";
    import { STLLoader }
      from "three/addons/loaders/STLLoader.js";
    import { OrbitControls }
      from "three/addons/controls/OrbitControls.js";

    const viewer = document.querySelector("#viewer");
    const fileInput = document.querySelector("#fileInput");
    const autoRotateInput = document.querySelector("#autoRotate");
    const statusElement = document.querySelector("#status");

    if (!viewer || !fileInput || !autoRotateInput || !statusElement) {
      console.error("STL-Viewer: Benötigte HTML-Elemente fehlen.");
      throw new Error("STL-Viewer: Initialisierung fehlgeschlagen.");
    }

    // Szene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111827);

    // Kamera
    const camera = new THREE.PerspectiveCamera(
      45,
      viewer.clientWidth / viewer.clientHeight,
      0.1,
      1000
    );

    camera.position.set(3, 2, 3);

    // Renderer
    const renderer = new THREE.WebGLRenderer({
      antialias: true
    });

    renderer.setPixelRatio(
      Math.min(window.devicePixelRatio, 2)
    );

    renderer.setSize(
      viewer.clientWidth,
      viewer.clientHeight
    );

    renderer.outputColorSpace = THREE.SRGBColorSpace;
    viewer.appendChild(renderer.domElement);

    // Maus- und Touchsteuerung
    const controls = new OrbitControls(
      camera,
      renderer.domElement
    );

    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2;

    // Beleuchtung
    const ambientLight = new THREE.HemisphereLight(
      0xffffff,
      0x444444,
      2.5
    );

    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(
      0xffffff,
      3
    );

    mainLight.position.set(4, 6, 3);
    scene.add(mainLight);

    const secondLight = new THREE.DirectionalLight(
      0xffffff,
      1.5
    );

    secondLight.position.set(-4, 2, -3);
    scene.add(secondLight);

    // STL-Loader
    const loader = new STLLoader();

    let model = null;

    function removeCurrentModel() {
      if (!model) {
        return;
      }

      scene.remove(model);
      model.geometry.dispose();
      model.material.dispose();
      model = null;
    }

    function displayGeometry(geometry) {
      removeCurrentModel();

      // Modell um den Ursprung zentrieren
      geometry.center();
      geometry.computeVertexNormals();
      geometry.computeBoundingSphere();

      const material = new THREE.MeshStandardMaterial({
        color: 0x3b82f6,
        roughness: 0.55,
        metalness: 0.1,
        side: THREE.DoubleSide
      });

      model = new THREE.Mesh(geometry, material);
      scene.add(model);

      // Kameraposition an die Modellgröße anpassen
      const radius = Math.max(
        geometry.boundingSphere?.radius ?? 1,
        0.01
      );

      camera.near = radius / 100;
      camera.far = radius * 100;
      camera.position.set(
        radius * 2.2,
        radius * 1.4,
        radius * 2.2
      );

      camera.updateProjectionMatrix();

      controls.target.set(0, 0, 0);
      controls.minDistance = radius * 0.2;
      controls.maxDistance = radius * 20;
      controls.update();
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files?.[0];

      if (!file) {
        return;
      }

      if (!file.name.toLowerCase().endsWith(".stl")) {
        statusElement.textContent =
          "Bitte eine STL-Datei auswählen.";
        return;
      }

      statusElement.textContent = "Datei wird geladen …";

      const objectUrl = URL.createObjectURL(file);

      loader.load(
        objectUrl,

        geometry => {
          URL.revokeObjectURL(objectUrl);
          displayGeometry(geometry);

          statusElement.textContent =
            `${file.name} geladen`;
        },

        undefined,

        error => {
          URL.revokeObjectURL(objectUrl);
          console.error(error);

          statusElement.textContent =
            "Die STL-Datei konnte nicht geladen werden.";
        }
      );
    });

    // Automatische Größenanpassung
    const resizeObserver = new ResizeObserver(() => {
      const width = viewer.clientWidth;
      const height = viewer.clientHeight;

      camera.aspect = width / height;
      camera.updateProjectionMatrix();

      renderer.setSize(width, height, false);
    });

    resizeObserver.observe(viewer);

    // Animationsschleife
    const clock = new THREE.Clock();

    renderer.setAnimationLoop(() => {
      const deltaTime = clock.getDelta();

      controls.autoRotate = autoRotateInput.checked;
      controls.update(deltaTime);

      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
