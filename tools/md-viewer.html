<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <meta name="author" content="GitHub Copilot">
  <meta name="client" content="Andreas Sigismund">
  <link rel="stylesheet" href="../../../../css/my.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.css">
  <style>
    main {
      max-width: 900px;
    }

    .viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .md-panel {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      padding: 24px;
    }

    .md-panel h1,
    .md-panel h2,
    .md-panel h3,
    .md-panel h4,
    .md-panel h5,
    .md-panel h6 {
      margin-top: 24px;
      margin-bottom: 12px;
    }

    .md-panel h1 {
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px;
    }

    .md-panel p {
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .md-panel ul,
    .md-panel ol {
      margin-bottom: 12px;
      margin-left: 24px;
    }

    .md-panel li {
      margin-bottom: 6px;
    }

    .md-panel code {
      background: #f5f5f5;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
    }

    .md-panel pre {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .md-panel pre code {
      background: none;
      padding: 0;
    }

    .md-panel blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 12px;
      margin-left: 0;
      margin-bottom: 12px;
      color: #666;
    }

    .md-panel table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
    }

    .md-panel table th,
    .md-panel table td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    .md-panel table th {
      background: #f5f5f5;
      font-weight: 600;
    }

    .md-panel a {
      color: var(--accent);
      text-decoration: none;
    }

    .md-panel a:hover {
      text-decoration: underline;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .action-link {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .action-link:hover {
      text-decoration: none;
      background: #dce9ff;
    }

    #error {
      color: #b91c1c;
      margin: 0;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h3 id="viewer-title">Markdown Viewer</h3>
  </header>

  <main>
    <section>
      <div class="viewer-header">
        <p id="file-info"></p>
        <div class="actions">
          <a id="download-link" class="action-link" href="#" download>Datei herunterladen</a>
          <!--a class="action-link" href="./index.html">Zurück</a-->
        </div>
      </div>
      <p id="error"></p>
      <div class="md-panel" id="content">Lade Datei ...</div>
    </section>
  </main>

  <footer>
    <a href="https://andreas519.github.io">AG Young Engineers</a> · Martin-Rinckart-Gymnasium Eilenburg<br>
    Auftraggeber: Andreas Sigismund · Autor: GitHub Copilot<br>
    Letzte Änderung: <span id="lastModified">TT.MM.JJJJ, hh:mm Uhr</span>
    <script src="../js/script.js"></script>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-html.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-css.min.js"></script>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file') || 'README.md';
      const title = params.get('title') || file;

      const contentEl = document.getElementById('content');
      const titleEl = document.getElementById('viewer-title');
      const fileInfoEl = document.getElementById('file-info');
      const downloadLinkEl = document.getElementById('download-link');
      const errorEl = document.getElementById('error');

      titleEl.textContent = title;
      document.title = title + ' · Markdown Viewer';
      fileInfoEl.textContent = 'Datei: ' + file;

      // Bestimme die tatsächliche Datei-URL
      let fileUrl = file;
      if (!file.startsWith('/')) {
        // Versuche, das Verzeichnis aus dem Referrer zu extrahieren
        if (document.referrer) {
          const referrerUrl = new URL(document.referrer);
          const referrerPath = referrerUrl.pathname;
          const referrerDir = referrerPath.substring(0, referrerPath.lastIndexOf('/') + 1);
          fileUrl = referrerDir + file;
        }
      }

      downloadLinkEl.href = fileUrl;
      downloadLinkEl.setAttribute('download', file.split('/').pop());

      // Warte auf marked
      function loadMarkdown() {
        fetch(fileUrl)
          .then(function(response) {
            if (!response.ok) {
              throw new Error('HTTP ' + response.status);
            }
            return response.text();
          })
          .then(function(text) {
            // Markdown zu HTML konvertieren
            let html;
            try {
              if (window.marked && typeof window.marked.parse === 'function') {
                html = window.marked.parse(text);
              } else if (window.marked && typeof window.marked === 'function') {
                html = window.marked(text);
              } else {
                throw new Error('marked-Bibliothek nicht geladen');
              }
            } catch (e) {
              throw new Error('Markdown-Fehler: ' + e.message);
            }
            
            contentEl.innerHTML = html;

            // Download-Link auf den Original-Dateiinhalt setzen (Blob)
            const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            const downloadUrl = URL.createObjectURL(blob);
            downloadLinkEl.href = downloadUrl;
            downloadLinkEl.setAttribute('download', file.split('/').pop());

            // Syntax-Highlighting für Code-Blöcke
            contentEl.querySelectorAll('pre code').forEach(function(el) {
              if (window.Prism) {
                Prism.highlightElement(el);
              }
            });
          })
          .catch(function(error) {
            errorEl.textContent = 'Datei konnte nicht geladen werden: ' + error.message;
            errorEl.style.display = 'block';
            contentEl.textContent = '';
          });
      }

      // Wenn marked bereits geladen, direkt starten
      if (window.marked) {
        loadMarkdown();
      } else {
        // Sonst auf das load-Event warten
        document.addEventListener('readystatechange', function() {
          if (document.readyState === 'interactive' || document.readyState === 'complete') {
            if (window.marked) {
              loadMarkdown();
            }
          }
        });
        // Zusätzlich ein Timeout setzen
        setTimeout(loadMarkdown, 500);
      }
    })();
  </script>
</body>
</html>
