<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Web Page</title>
    <!-- Link to external CSS below -->
    <link rel="stylesheet" href="css/test.css">
    <script>
function ladeDatei(datei, elementId) {
  fetch(datei)
    .then(response => {
      if (!response.ok) {
        throw new Error("HTTP-Fehler " + response.status);
      }
      return response.text();
    })
    .then(text => {
      document.getElementById(elementId).textContent = text;
    })
    .catch(error => {
      document.getElementById(elementId).textContent =
        "Datei konnte nicht geladen werden: " + datei;
    });
}


</script>
</head>
<body>
    <h1>Hello World from root</h1>
    <script>ladeDatei("/css/main.py", "main-py");
    </script>

    <p>
  Zuletzt geändert:
  <span id="lastModified"></span>
</p>

<section>
  <h2>Quelltext: main.py</h2>

  <iframe
    src="css/main.py"
    class="codefenster">
  </iframe>
</section>

<script>
  const datum = new Date(document.lastModified);

  document.getElementById("lastModified").textContent =
    datum.toLocaleString("de-DE", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    }) + " Uhr";
</script>
</body>
</html>
