<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Python-Code mit Syntaxhighlighting und Scrollbereich</title>

  <link rel="stylesheet" href="/css/prism.css"> <!-- Prism Grunddesign -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.css"> <!-- Prism Zeilennummern -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/plugins/line-numbers/prism-line-numbers.css">
  <script src="/js/prism.js"></script>
</head>

<body>

<header>
  <h1>Python-Quelltext anzeigen</h1>
  <p>Der Code wird aus einer externen Datei geladen, farbig hervorgehoben und in einem Scrollbereich angezeigt.</p>
</header>

<main>
  <section class="karte">
    <h2>main.py</h2>
    <p>
      In diesem Bereich werden ungefähr 10 Zeilen angezeigt.
      Längere Dateien bleiben scrollbar.
    </p>

    <pre class="line-numbers codebereich"><code id="codefenster" class="language-python"></code></pre>
  </section>
</main>

<!-- Prism -->
<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>

<!-- Prism Plugin für Zeilennummern -->
<script src="https://cdn.jsdelivr.net/npm/prismjs/plugins/line-numbers/prism-line-numbers.min.js"></script>

<!-- eigenes Script -->
<script src="script.js"></script>

</body>
</html>
