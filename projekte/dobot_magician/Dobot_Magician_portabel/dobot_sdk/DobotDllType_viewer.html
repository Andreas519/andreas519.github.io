<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DobotDllType.py – Quellcode</title>
  <link rel="stylesheet" href="../../../../css/prism.css">
  <style>
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #f4f6f8; color: #1f2937; }
    header { background: #183b5b; color: white; padding: 1rem 1.5rem; }
    header h1 { margin: 0; font-size: 1.2rem; }
    header a { color: #9dc8f0; font-size: .9rem; text-decoration: none; margin-left: 1rem; }
    header a:hover { text-decoration: underline; }
    main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
    pre { border: 1px solid #dfe5eb; border-radius: 8px; overflow-x: auto; }
    #fehler { color: #b91c1c; padding: 1rem; display: none; }
  </style>
</head>
<body>
  <header>
    <h1>DobotDllType.py <a href="DobotDllType.py" download>⬇ herunterladen</a></h1>
  </header>
  <main>
    <p id="fehler">Datei konnte nicht geladen werden. (Beim lokalen Öffnen über file:// ist fetch() nicht erlaubt – bitte über einen Webserver aufrufen.)</p>
    <pre><code class="language-python" id="code"></code></pre>
  </main>
  <script src="../../../../js/prism-core.js"></script>
  <script>
    fetch('DobotDllType.py')
      .then(function(r) {
        if (!r.ok) throw new Error();
        return r.text();
      })
      .then(function(text) {
        var el = document.getElementById('code');
        el.textContent = text;
        Prism.highlightElement(el);
      })
      .catch(function() {
        document.getElementById('fehler').style.display = 'block';
      });
  </script>
</body>
</html>
